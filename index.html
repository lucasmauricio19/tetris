<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Puzzle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game">
    <canvas id="game" width="320" height="640"></canvas>

    <div class="panel">
      <h1>COLOR<br>PUZZLE</h1>

      <div class="info">
        <span>Pontos</span>
        <b id="score">0</b>
      </div>

      <div class="info">
        <span>Linhas</span>
        <b id="lines">0</b>
      </div>

      <div class="info">
        <span>Nível</span>
        <b id="level">1</b>
      </div>

      <button id="restart">Reiniciar</button>

      <p class="help">
        ← → mover<br>
        ↑ girar<br>
        ↓ descer<br>
        Espaço cair
      </p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
