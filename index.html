<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris de Areia</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="game">
    <canvas id="gameCanvas" width="320" height="640"></canvas>

    <aside class="panel">
      <h1>SAND<br>TETRIS</h1>

      <div class="info">
        <span>Pontos</span>
        <strong id="score">0</strong>
      </div>

      <div class="info">
        <span>Nível</span>
        <strong id="level">1</strong>
      </div>

      <button id="restartBtn">Reiniciar</button>

      <p class="help">
        ← → mover<br>
        ↑ girar<br>
        ↓ acelerar<br>
        Espaço: cair
      </p>
    </aside>
  </main>

  <script src="./script.js"></script>
</body>
</html>
